# yaml-language-server: $schema=../../../../schemas/csr_schema.json

$schema: "csr_schema.json#"
kind: csr
name: vsip
long_name: Virtual Supervisor Interrupt Pending
description: |
  The `vsip` register is a VSXLEN-bit read/write register that is VS-mode’s version of the `sip` CSR.
  When V=1, instructions that normally access `sip` instead access `vsip`. It holds the pending
  interrupt status for supervisor-level traps in a virtualized environment.

  However, interrupts directed to HS-level continue to be indicated in the HS-level `sip` register,
  not in `vsip`, when V=1.

  The standard portion (bits 15:0) includes individual interrupt-pending bits.
address: 0x244
virtual_address: 0x144
writable: true
priv_mode: VS
definedBy:
  extension:
    name: H
sw_read(): |
  Bits<SXLEN> result = 0;
  if ($bits(CSR[hideleg])[2]) result[1] = $bits(CSR[hip])[2];
  if ($bits(CSR[hideleg])[6]) result[5] = $bits(CSR[hip])[6];
  if ($bits(CSR[hideleg])[10]) result[9] = $bits(CSR[hip])[10];
  if ($bits(CSR[hideleg])[13]) result[13] = $bits(CSR[sip])[13];
  return result;
length: VSXLEN
fields:
  SSIP:
    location: 1
    type: RW-H
    reset_value: UNDEFINED_LEGAL
    sw_write(csr_value): |
      if ($bits(CSR[hideleg])[2]) {
        CSR[hip].VSSIP = csr_value.SSIP;
      }
    description: |
      *Supervisor Software Interrupt Pending*
      Indicates a pending software interrupt at the supervisor level.
      Read-only zero when `hideleg[2] == 0`, else aliased to `hip.VSSIP`.

  STIP:
    location: 5
    type: RO-H
    reset_value: UNDEFINED_LEGAL
    description: |
      *Supervisor Timer Interrupt Pending*
      Indicates a pending timer interrupt at the supervisor level.
      Read-only zero when `hideleg[6] == 0`, else aliased to `hip.VSTIP`.

  SEIP:
    location: 9
    type: RO-H
    reset_value: UNDEFINED_LEGAL
    description: |
      *Supervisor External Interrupt Pending*
      Indicates a pending external interrupt at the supervisor level.
      Read-only zero when `hideleg[10] == 0`, else aliased to `hip.VSEIP`.

  LCOFIP:
    location: 13
    type: RW-H
    reset_value: UNDEFINED_LEGAL
    sw_write(csr_value): |
      if ($bits(CSR[hideleg])[13]) {
        CSR[sip].LCOFIP = csr_value.LCOFIP;
      }
    description: |
      *Local Counter Overflow Interrupt Pending*
      Indicates an overflow of a local counter.
      Read-only zero when `hideleg[13] == 0`, else aliased to `sip.LCOFIP`.
