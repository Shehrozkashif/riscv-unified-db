# yaml-language-server: $schema=../../../schemas/csr_schema.json

$schema: "csr_schema.json#"
kind: csr
name: vstimecmp
long_name: Virtual Supervisor Timer Register
address: 0x24D
virtual_address: 0x24D
priv_mode: VS
writable: true
definedBy:
  extension:
    name: H
requires: Sstc
length: 64
description: |
  The vstimecmp CSR is a 64-bit register and provides 64-bit precision on all RV32 and RV64 systems.
  In RV32, accesses to the vstimecmp CSR access the low 32 bits, while accesses to the vstimecmph CSR access the high 32 bits of vstimecmp.
  A virtual supervisor timer interrupt becomes pending whenever (time + htimedelta) is greater than or equal to vstimecmp.
  The interrupt remains posted until vstimecmp becomes greater than (time + htimedelta).

fields:
  VSTIMECMP:
    long_name: Virtual supervisor timer compare value
    location_rv32: 31-0
    location_rv64: 63-0
    type: RW
    reset_value: UNDEFINED_LEGAL
    description: |
      The value in vstimecmp is compared with (time + htimedelta), truncated to 64 bits,
      to determine whether a virtual supervisor timer interrupt should be posted in VSTIP.
