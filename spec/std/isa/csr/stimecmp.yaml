# yaml-language-server: $schema=../../../schemas/csr_schema.json

$schema: "csr_schema.json#"
kind: csr
name: stimecmp
long_name: Supervisor Timer Compare Register
address: 0x14D
virtual_address: 0x14D
priv_mode: S
writable: true
definedBy:
  extension:
    name: Sstc
length: 64
description: |
  The stimecmp CSR is a 64-bit register and provides 64-bit precision on all RV32 and RV64 systems.
  On RV32, accesses to the stimecmp CSR access the low 32 bits, while accesses to the stimecmph CSR access the high 32 bits of stimecmp.
  A supervisor timer interrupt becomes pending whenever the time register contains a value greater than or equal to stimecmp.
  The interrupt remains posted until stimecmp becomes greater than time.

fields:
  STIMECMP:
    long_name: Supervisor timer compare value
    location_rv32: 31-0
    location_rv64: 63-0
    type: RW
    reset_value: 0
    sw_write(csr_value): |
      return csr_value.STIMECMP;
    description: |
      The value in stimecmp is compared against the current value of the time CSR.
      If time is greater than or equal to stimecmp, a supervisor timer interrupt (STIP) is posted.
